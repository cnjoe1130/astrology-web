<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f7f3ec;--paper-2:#efe9df;
  --ink:#191511;--ink-2:#544c44;--ink-3:#6e6459;
  --accent:#a63e0c;--accent-bright:#d9651f;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Outfit',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-body);color:var(--ink);
  background:var(--paper);line-height:1.7;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* ── Navigation ── */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2rem;
  background:rgba(247,243,236,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(25,21,17,.06);
}
.nav-brand{
  font-family:var(--font-display);font-weight:700;font-size:1.1rem;
  color:var(--accent);text-decoration:none;letter-spacing:-.02em;
}
.nav-links{display:flex;gap:1.25rem;align-items:center}
.nav-links a{
  font-size:.85rem;font-weight:500;color:var(--ink-2);
  text-decoration:none;transition:color .2s;
}
.nav-links a:hover{color:var(--accent)}

/* ── Page Header ── */
.page-header{
  text-align:center;padding:2.5rem 2rem 1rem;
}
.page-header h1{
  font-family:var(--font-display);font-weight:800;
  font-size:clamp(1.8rem,4vw,2.8rem);
  letter-spacing:-.02em;margin-bottom:.5rem;
}
.page-header h1 em{font-style:italic;color:var(--accent);font-variation-settings:"opsz" 144}
.page-header p{color:var(--ink-2);font-size:1rem}

/* ── Input Form ── */
.form-section{
  max-width:680px;margin:0 auto;padding:1.5rem 2rem 2.5rem;
}
.form-card{
  background:var(--paper-2);border-radius:16px;
  padding:2rem;border:1px solid rgba(25,21,17,.05);
}
.form-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;
}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-group.full{grid-column:1/-1}
.form-group label{
  font-size:.8rem;font-weight:600;color:var(--ink-2);
  letter-spacing:.03em;
}
.form-group input,.form-group select{
  padding:.7rem 1rem;border:1.5px solid rgba(25,21,17,.12);
  border-radius:8px;font-family:var(--font-body);font-size:.95rem;
  background:#fff;color:var(--ink);transition:border-color .2s;
  outline:none;
}
.form-group input:focus,.form-group select:focus{
  border-color:var(--accent);
}
.form-group input::placeholder{color:var(--ink-3)}
.city-suggestions{
  position:absolute;top:100%;left:0;right:0;
  background:#fff;border:1.5px solid rgba(25,21,17,.12);
  border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;
  z-index:50;display:none;
  box-shadow:0 8px 24px rgba(25,21,17,.1);
}
.city-suggestions.visible{display:block}
.city-suggestion{
  padding:.6rem 1rem;cursor:pointer;font-size:.9rem;
  transition:background .15s;
}
.city-suggestion:hover{background:rgba(166,62,12,.06)}
.city-suggestion small{color:var(--ink-3);font-size:.78rem;margin-left:.5rem}
.city-input-wrap{position:relative}
.btn-calculate{
  margin-top:1.5rem;width:100%;
  padding:.9rem;border:none;border-radius:10px;
  background:var(--accent);color:#fff;
  font-family:var(--font-body);font-weight:600;font-size:1rem;
  cursor:pointer;transition:all .25s;
  box-shadow:0 2px 12px rgba(166,62,12,.2);
}
.btn-calculate:hover{
  background:var(--accent-bright);
  box-shadow:0 4px 20px rgba(166,62,12,.3);
  transform:translateY(-1px);
}
.btn-calculate:active{transform:translateY(0)}
.btn-calculate:disabled{
  opacity:.6;cursor:not-allowed;transform:none;
}

/* ── Chart Result ── */
.result-section{
  max-width:1100px;margin:0 auto;padding:0 2rem 3rem;
  display:none;
}
.result-section.visible{display:block}
.result-header{
  text-align:center;margin-bottom:2rem;
}
.result-header h2{
  font-family:var(--font-display);font-weight:700;
  font-size:1.8rem;letter-spacing:-.02em;margin-bottom:.25rem;
}
.result-header .birth-info{
  color:var(--ink-3);font-size:.9rem;
}

/* ── Chart Layout ── */
.chart-layout{
  display:grid;grid-template-columns:1fr 1fr;gap:2rem;
  align-items:start;
}
.chart-svg-wrap{
  background:var(--paper-2);border-radius:20px;
  padding:1.5rem;border:1px solid rgba(25,21,17,.05);
  display:flex;align-items:center;justify-content:center;
}
.chart-svg-wrap svg{width:100%;height:auto;max-width:520px}

/* ── Reading Panel ── */
.reading-panel{display:flex;flex-direction:column;gap:1.25rem}
.reading-card{
  background:var(--paper-2);border-radius:14px;
  padding:1.5rem;border:1px solid rgba(25,21,17,.05);
}
.reading-card h3{
  font-family:var(--font-display);font-weight:700;
  font-size:1.1rem;margin-bottom:.75rem;
  display:flex;align-items:center;gap:.5rem;
}
.reading-card h3 span{color:var(--accent);font-size:1.15rem}

/* Big 3 */
.big3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.big3-item{text-align:center}
.big3-label{font-size:.7rem;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem}
.big3-sign{
  font-family:var(--font-display);font-weight:700;
  font-size:1.15rem;color:var(--ink);
}
.big3-detail{font-size:.78rem;color:var(--ink-3);margin-top:.1rem}

/* Element bars */
.element-bars{display:flex;flex-direction:column;gap:.6rem}
.element-row{display:flex;align-items:center;gap:.75rem}
.element-name{width:40px;font-size:.8rem;font-weight:600;color:var(--ink-2)}
.element-bar-bg{
  flex:1;height:8px;background:rgba(25,21,17,.06);
  border-radius:4px;overflow:hidden;
}
.element-bar-fill{
  height:100%;border-radius:4px;transition:width .6s ease;
}
.element-bar-fill.fire{background:linear-gradient(90deg,#d9651f,#ff8c42)}
.element-bar-fill.earth{background:linear-gradient(90deg,#6b8f3c,#8ab648)}
.element-bar-fill.air{background:linear-gradient(90deg,#4a90c4,#6bb3e0)}
.element-bar-fill.water{background:linear-gradient(90deg,#3d7a8a,#5aadbd)}
.element-pct{width:32px;text-align:right;font-size:.8rem;color:var(--ink-3);font-family:var(--font-mono)}

/* Strengths & Challenges */
.trait-list{display:flex;flex-wrap:wrap;gap:.5rem}
.trait-tag{
  padding:.35rem .75rem;border-radius:20px;font-size:.82rem;font-weight:500;
}
.trait-tag.strength{
  background:rgba(107,143,60,.1);color:#5a7a2e;
  border:1px solid rgba(107,143,60,.15);
}
.trait-tag.challenge{
  background:rgba(166,62,12,.07);color:var(--accent);
  border:1px solid rgba(166,62,12,.12);
}

/* Planets table */
.planets-table{width:100%;border-collapse:collapse}
.planets-table td{
  padding:.45rem 0;border-bottom:1px solid rgba(25,21,17,.05);
  font-size:.88rem;
}
.planets-table tr:last-child td{border-bottom:none}
.planets-table .glyph{font-size:1.1rem;width:28px;text-align:center}
.planets-table .pname{font-weight:600;width:80px}
.planets-table .psign{color:var(--ink-2)}
.planets-table .pdeg{font-family:var(--font-mono);font-size:.82rem;color:var(--ink-3)}

/* ── Footer ── */
.footer{
  padding:2rem;border-top:1px solid rgba(25,21,17,.06);
  text-align:center;color:var(--ink-3);font-size:.82rem;
}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ── Responsive ── */
@media(max-width:800px){
  .chart-layout{grid-template-columns:1fr}
  .chart-svg-wrap{order:-1}
  .big3{grid-template-columns:repeat(3,1fr);gap:.5rem}
}
@media(max-width:520px){
  .nav{padding:.75rem 1rem}
  .page-header{padding:1.5rem 1rem .5rem}
  .form-section{padding:1rem 1rem 1.5rem}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .result-section{padding:0 1rem 2rem}
  .big3{grid-template-columns:1fr}
  .reading-panel{gap:1rem}
}
</style>
</head>

const cityInput = document.getElementById('birthCity');
const citySuggestions = document.getElementById('citySuggestions');
const cityLat = document.getElementById('cityLat');
const cityLng = document.getElementById('cityLng');
let selectedCity = null;

cityInput.addEventListener('input', function() {
  const val = this.value.trim().toLowerCase();
  if (val.length === 0) { citySuggestions.classList.remove('visible'); return; }
  const matches = CITIES.filter(c =>
    c.name.includes(val) || c.pinyin.includes(val)
  ).slice(0, 8);

  if (matches.length === 0) { citySuggestions.classList.remove('visible'); return; }

  citySuggestions.innerHTML = matches.map((c,i) =>
    `<div class="city-suggestion" data-idx="${CITIES.indexOf(c)}">${c.name}<small>${c.lat.toFixed(2)}°N, ${c.lng.toFixed(2)}°E</small></div>`
  ).join('');
  citySuggestions.classList.add('visible');
});

citySuggestions.addEventListener('click', function(e) {
  const item = e.target.closest('.city-suggestion');
  if (!item) return;
  const idx = parseInt(item.dataset.idx);
  const city = CITIES[idx];
  cityInput.value = city.name;
  cityLat.value = city.lat;
  cityLng.value = city.lng;
  selectedCity = city;
  citySuggestions.classList.remove('visible');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.city-input-wrap')) {
    citySuggestions.classList.remove('visible');
  }
});

// ASTRONOMICAL CALCULATIONS
// ═══════════════════════════════════════════════════

// Julian Day Number from date/time (UTC)
function toJulianDay(year, month, day, hour, minute) {
  if (month <= 2) { year -= 1; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  const dayFrac = day + (hour + minute / 60) / 24;
  return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + dayFrac + B - 1524.5;
}

// Julian centuries from J2000.0
function julianCenturies(jd) {
  return (jd - 2451545.0) / 36525.0;
}

// Mean obliquity of ecliptic
function obliquity(T) {
  return 23.4392911 - 0.0130042 * T - 1.64e-7 * T * T + 5.04e-7 * T * T * T;
}

// Sun's mean longitude (degrees)
function sunMeanLongitude(T) {
  return (280.46646 + 36000.76983 * T + 0.0003032 * T * T) % 360;
}

// Sun's mean anomaly (degrees)
function sunMeanAnomaly(T) {
  return (357.52911 + 35999.05029 * T - 0.0001537 * T * T) % 360;
}

// Sun's equation of center
function sunEqCenter(T) {
  const M = sunMeanAnomaly(T);
  const Mrad = M * Math.PI / 180;
  return (1.9146 * Math.sin(Mrad) + 0.02 * Math.sin(2 * Mrad) + 0.0003 * Math.sin(3 * Mrad));
}

// Sun's true longitude
function sunTrueLongitude(T) {
  return (sunMeanLongitude(T) + sunEqCenter(T)) % 360;
}

// Sun's apparent longitude (nutation correction)
function sunApparentLongitude(T) {
  const omega = 125.04 - 1934.136 * T;
  const L = sunTrueLongitude(T);
  return L - 0.00569 - 0.00478 * Math.sin(omega * Math.PI / 180);
}

// Convert ecliptic longitude to zodiac sign index (0-11)
function longitudeToSign(lon) {
  lon = ((lon % 360) + 360) % 360;
  return Math.floor(lon / 30);
}

// Get sign and degree within sign
function longitudeToSignDegree(lon) {
  lon = ((lon % 360) + 360) % 360;
  const signIdx = Math.floor(lon / 30);
  const degreeInSign = lon - signIdx * 30;
  return { signIndex: signIdx, degree: degreeInSign };
}

// Get sun sign from birth date (tropical zodiac, based on true longitude)
function getSunSign(date) {
  const T = julianCenturies(toJulianDay(date.getFullYear(), date.getMonth()+1, date.getDate(), 12, 0));
  const lon = sunApparentLongitude(T);
  return longitudeToSignDegree(lon);
}

// Moon's mean longitude
function moonMeanLongitude(T) {
  return (218.3165 + 481267.8813 * T) % 360;
}

// Moon's mean anomaly
function moonMeanAnomaly(T) {
  return (134.9634 + 477198.8676 * T + 0.008997 * T * T) % 360;
}

// Moon's mean elongation
function moonMeanElongation(T) {
  return (297.8502 + 445267.1115 * T - 0.00163 * T * T) % 360;
}

// Moon's mean argument of latitude
function moonMeanArgumentOfLatitude(T) {
  return (93.2720 + 483202.0175 * T - 0.003403 * T * T) % 360;
}

// Moon's ecliptic longitude (simplified)
function moonLongitude(T) {
  const L = moonMeanLongitude(T);
  const M = moonMeanAnomaly(T);
  const D = moonMeanElongation(T);
  const F = moonMeanArgumentOfLatitude(T);
  const Lrad = L * Math.PI / 180;
  const Mrad = M * Math.PI / 180;
  const Drad = D * Math.PI / 180;
  const Frad = F * Math.PI / 180;

  // Simplified lunar longitude
  let lon = L;
  lon += 6.289 * Math.sin(Mrad);
  lon += 1.274 * Math.sin(2 * Drad - Mrad);
  lon += 0.658 * Math.sin(2 * Drad);
  lon += 0.214 * Math.sin(2 * Mrad);
  lon -= 0.186 * Math.sin(Mrad); // correction
  lon -= 0.114 * Math.sin(2 * Frad);
  lon += 0.059 * Math.sin(2 * Drad - 2 * Mrad);
  lon += 0.057 * Math.sin(2 * Drad - Mrad - Frad);
  lon += 0.053 * Math.sin(2 * Drad + Mrad);
  lon += 0.046 * Math.sin(2 * Drad - Frad);
  lon += 0.041 * Math.sin(2 * Drad - Mrad + Frad);

  return ((lon % 360) + 360) % 360;
}

function getMoonSign(date, hour, minute) {
  const jd = toJulianDay(date.getFullYear(), date.getMonth()+1, date.getDate(), hour, minute);
  const T = julianCenturies(jd);
  const lon = moonLongitude(T);
  return longitudeToSignDegree(lon);
}

// Rising sign (Ascendant)
function getAscendant(date, hour, minute, longitude) {
  const jd = toJulianDay(date.getFullYear(), date.getMonth()+1, date.getDate(), hour, minute);
  const T = julianCenturies(jd);

  // Local Sidereal Time
  const GMST0 = 280.46056195 + 360.98564736629 * (jd - 2451545.0);
  const nutation = 0.00478 * Math.sin((125.04 - 1934.136 * T) * Math.PI / 180);
  const LST = ((GMST0 + longitude + nutation) % 360 + 360) % 360;
  const LSTrad = LST * Math.PI / 180;

  const eps = obliquity(T) * Math.PI / 180;

  // Ascendant formula
  let asc = Math.atan2(
    Math.cos(LSTrad),
    -(Math.sin(LSTrad) * Math.cos(eps) + Math.tan(0) * Math.sin(eps))
  ) * 180 / Math.PI;

  // More accurate formula
  const y = -Math.cos(LSTrad);
  const x = Math.sin(LSTrad) * Math.cos(eps) + Math.tan(0) * Math.sin(eps);
  asc = Math.atan2(y, x) * 180 / Math.PI;

  return longitudeToSignDegree(((asc % 360) + 360) % 360);
}

// ═══════════════════════════════════════════════════
// MEAN PLANET POSITIONS (simplified)
// ═══════════════════════════════════════════════════
function getPlanetPositions(date, hour, minute, longitude) {
  const jd = toJulianDay(date.getFullYear(), date.getMonth()+1, date.getDate(), hour, minute);
  const T = julianCenturies(jd);

  const positions = {};

  // Sun
  const sunLon = sunApparentLongitude(T);
  positions.sun = longitudeToSignDegree(sunLon);

  // Moon
  const moonLon = moonLongitude(T);
  positions.moon = longitudeToSignDegree(moonLon);

  // Mercury - mean longitude with correction
  let mercuryLon = (252.2509 + 149472.6746 * T + 0.00030 * T * T) % 360;
  mercuryLon += 23.44 * Math.sin((179.37 + 359.9905 * T) * Math.PI / 180);
  positions.mercury = longitudeToSignDegree(((mercuryLon % 360) + 360) % 360);

  // Venus
  let venusLon = (181.9800 + 58517.8157 * T + 0.00000 * T * T) % 360;
  venusLon += 0.77 * Math.sin((50.46 + 585.1580 * T) * Math.PI / 180);
  positions.venus = longitudeToSignDegree(((venusLon % 360) + 360) % 360);

  // Mars
  let marsLon = (355.4330 + 19140.2993 * T + 0.00026 * T * T) % 360;
  marsLon += 10.69 * Math.sin((197.33 + 191.3967 * T) * Math.PI / 180);
  positions.mars = longitudeToSignDegree(((marsLon % 360) + 360) % 360);

  // Jupiter
  let jupiterLon = (34.3515 + 3034.9057 * T + 0.00034 * T * T) % 360;
  jupiterLon += 0.33 * Math.sin((20.02 + 303.4906 * T) * Math.PI / 180);
  positions.jupiter = longitudeToSignDegree(((jupiterLon % 360) + 360) % 360);

  // Saturn
  let saturnLon = (50.0774 + 1222.1138 * T + 0.00034 * T * T) % 360;
  saturnLon += 0.12 * Math.sin((317.02 + 122.2114 * T) * Math.PI / 180);
  positions.saturn = longitudeToSignDegree(((saturnLon % 360) + 360) % 360);

  // Uranus
  let uranusLon = (314.0550 + 428.4669 * T + 0.00034 * T * T) % 360;
  uranusLon += 0.05 * Math.sin((142.24 + 42.8467 * T) * Math.PI / 180);
  positions.uranus = longitudeToSignDegree(((uranusLon % 360) + 360) % 360);

  // Neptune
  let neptuneLon = (304.3487 + 218.4862 * T + 0.00034 * T * T) % 360;
  neptuneLon += 0.04 * Math.sin((256.23 + 21.8466 * T) * Math.PI / 180);
  positions.neptune = longitudeToSignDegree(((neptuneLon % 360) + 360) % 360);

  // Pluto
  let plutoLon = (238.9289 + 145.2078 * T + 0.00034 * T * T) % 360;
  plutoLon += 0.03 * Math.sin((113.83 + 14.5208 * T) * Math.PI / 180);
  positions.pluto = longitudeToSignDegree(((plutoLon % 360) + 360) % 360);

  // Ascendant
  positions.ascendant = getAscendant(date, hour, minute, longitude);

  // Houses (Equal house system from Ascendant)
  const ascDeg = positions.ascendant.signIndex * 30 + positions.ascendant.degree;
  positions.houses = [];
  for (let i = 0; i < 12; i++) {
    const houseLon = (ascDeg + i * 30) % 360;
    positions.houses.push(longitudeToSignDegree(houseLon));
  }

  return positions;
}

// ═══════════════════════════════════════════════════
// ASPECT CALCULATIONS
// ═══════════════════════════════════════════════════
const ASPECTS = [
  {name:"合相",nameEn:"Conjunction",angle:0,orb:8,color:"#d9651f",type:"hard",symbol:"☌"},
  {name:"对冲",nameEn:"Opposition",angle:180,orb:8,color:"#d9651f",type:"hard",symbol:"☍"},
  {name:"三分",nameEn:"Trine",angle:120,orb:6,color:"#4a90c4",type:"soft",symbol:"△"},
  {name:"四分",nameEn:"Square",angle:90,orb:6,color:"#d9651f",type:"hard",symbol:"□"},
  {name:"六分",nameEn:"Sextile",angle:60,orb:5,color:"#4a90c4",type:"soft",symbol:"✦"}
];

function calcAspects(positions) {
  const planetKeys = ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'];
  const aspects = [];

  for (let i = 0; i < planetKeys.length; i++) {
    for (let j = i + 1; j < planetKeys.length; j++) {
      const pos1 = positions[planetKeys[i]].signIndex * 30 + positions[planetKeys[i]].degree;
      const pos2 = positions[planetKeys[j]].signIndex * 30 + positions[planetKeys[j]].degree;
      let diff = Math.abs(pos1 - pos2);
      if (diff > 180) diff = 360 - diff;

      for (const asp of ASPECTS) {
        const diffFromAngle = Math.abs(diff - asp.angle);
        if (diffFromAngle <= asp.orb) {
          aspects.push({
            planet1: planetKeys[i],
            planet2: planetKeys[j],
            aspect: asp,
            exact: diffFromAngle,
            orb: diffFromAngle
          });
        }
      }
    }
  }
  return aspects;
}

// ═══════════════════════════════════════════════════
// SVG CHART RENDERING
// ═══════════════════════════════════════════════════
function renderChart(positions, aspects) {
  const svg = document.getElementById('chartSvg');
  const cx = 300, cy = 300;
  const outerR = 280, zodiacR = 260, innerR = 200, houseR = 190, planetR = 170, centerR = 80;

  let html = '';

  // Background
  html += `<circle cx="${cx}" cy="${cy}" r="${outerR}" fill="rgba(247,243,236,0.5)" stroke="rgba(25,21,17,0.1)" stroke-width="1.5"/>`;
  html += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="rgba(239,233,223,0.5)" stroke="rgba(25,21,17,0.08)" stroke-width="1"/>`;
  html += `<circle cx="${cx}" cy="${cy}" r="${centerR}" fill="rgba(239,233,223,0.7)" stroke="rgba(25,21,17,0.08)" stroke-width="1"/>`;

  // Zodiac segments
  for (let i = 0; i < 12; i++) {
    const startAngle = (i * 30 - 90) * Math.PI / 180;
    const endAngle = ((i + 1) * 30 - 90) * Math.PI / 180;
    const sign = ZODIAC_SIGNS[i];
    const color = ZODIAC_COLORS[sign.element];

    // Outer segment
    const x1 = cx + zodiacR * Math.cos(startAngle);
    const y1 = cy + zodiacR * Math.sin(startAngle);
    const x2 = cx + zodiacR * Math.cos(endAngle);
    const y2 = cy + zodiacR * Math.sin(endAngle);
    const ix1 = cx + innerR * Math.cos(startAngle);
    const iy1 = cy + innerR * Math.sin(startAngle);
    const ix2 = cx + innerR * Math.cos(endAngle);
    const iy2 = cy + innerR * Math.sin(endAngle);

    html += `<path d="M${x1},${y1} A${zodiacR},${zodiacR} 0 0,1 ${x2},${y2} L${ix2},${iy2} A${innerR},${innerR} 0 0,0 ${ix1},${iy1} Z" fill="${color}12" stroke="${color}30" stroke-width="0.5"/>`;

    // Zodiac glyph
    const midAngle = ((i * 30 + 15) - 90) * Math.PI / 180;
    const glyphR = (zodiacR + innerR) / 2;
    const gx = cx + glyphR * Math.cos(midAngle);
    const gy = cy + glyphR * Math.sin(midAngle);

    html += `<text x="${gx}" y="${gy}" text-anchor="middle" dominant-baseline="central" font-size="18" fill="${color}" opacity="0.85">${sign.glyph}</text>`;

    // Zodiac name (small)
    const nameR = (zodiacR + innerR) / 2 + 14;
    const nx = cx + nameR * Math.cos(midAngle);
    const ny = cy + nameR * Math.sin(midAngle);
    html += `<text x="${nx}" y="${ny}" text-anchor="middle" dominant-baseline="central" font-size="7" fill="${color}" opacity="0.6" font-family="var(--font-body)">${sign.name}</text>`;
  }

  // House cusp lines
  for (let i = 0; i < 12; i++) {
    const house = positions.houses[i];
    const angle = (house.signIndex * 30 + house.degree - 90) * Math.PI / 180;
    const x1 = cx + centerR * Math.cos(angle);
    const y1 = cy + centerR * Math.sin(angle);
    const x2 = cx + innerR * Math.cos(angle);
    const y2 = cy + innerR * Math.sin(angle);
    const isAngular = (i % 3 === 0);
    html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(25,21,17,${isAngular ? 0.3 : 0.12})" stroke-width="${isAngular ? 1.5 : 0.8}" stroke-dasharray="${isAngular ? 'none' : '3,3'}"/>`;

    // House number
    if (i % 3 === 0) {
      const houseNumR = (centerR + innerR) / 2 + 15;
      const hnx = cx + houseNumR * Math.cos(angle);
      const hny = cy + houseNumR * Math.sin(angle);
      html += `<text x="${hnx}" y="${hny}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--ink-3)" font-family="var(--font-mono)" font-weight="600">${i === 0 ? 'I' : i === 3 ? 'IV' : i === 6 ? 'VII' : 'X'}</text>`;
    }
  }

  // Ascendant line (special)
  const asc = positions.ascendant;
  const ascAngle = (asc.signIndex * 30 + asc.degree - 90) * Math.PI / 180;
  html += `<line x1="${cx + centerR * Math.cos(ascAngle)}" y1="${cy + centerR * Math.sin(ascAngle)}" x2="${cx + outerR * Math.cos(ascAngle)}" y2="${cy + outerR * Math.sin(ascAngle)}" stroke="var(--accent)" stroke-width="2"/>`;

  // Aspect lines (inside the chart)
  for (const asp of aspects) {
    const p1 = positions[asp.planet1];
    const p2 = positions[asp.planet2];
    const angle1 = (p1.signIndex * 30 + p1.degree - 90) * Math.PI / 180;
    const angle2 = (p2.signIndex * 30 + p2.degree - 90) * Math.PI / 180;
    const r = 135;

    const x1 = cx + r * Math.cos(angle1);
    const y1 = cy + r * Math.sin(angle1);
    const x2 = cx + r * Math.cos(angle2);
    const y2 = cy + r * Math.sin(angle2);

    const opacity = Math.max(0.2, 1 - asp.orb / asp.aspect.orb * 0.6);
    html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${asp.aspect.color}" stroke-width="1" opacity="${opacity}"/>`;
  }

  // Planet positions
  const planetOrder = ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'];
  for (const key of planetOrder) {
    const pos = positions[key];
    const angle = (pos.signIndex * 30 + pos.degree - 90) * Math.PI / 180;
    const pr = planetR;
    const px = cx + pr * Math.cos(angle);
    const py = cy + pr * Math.sin(angle);
    const sign = ZODIAC_SIGNS[pos.signIndex];
    const color = ZODIAC_COLORS[sign.element];

    html += `<circle cx="${px}" cy="${py}" r="14" fill="${color}18" stroke="${color}" stroke-width="1"/>`;
    html += `<text x="${px}" y="${py}" text-anchor="middle" dominant-baseline="central" font-size="13" fill="${color}" font-weight="600">${PLANET_GLYPHS[key]}</text>`;
  }

  // Center info
  html += `<text x="${cx}" y="${cy - 15}" text-anchor="middle" font-family="var(--font-display)" font-size="11" fill="var(--ink-3)" font-weight="600">ASC</text>`;
  html += `<text x="${cx}" y="${cy + 5}" text-anchor="middle" font-family="var(--font-display)" font-size="14" fill="var(--accent)" font-weight="700">${asc.signIndex * 30 + asc.degree > 0 ? Math.floor(asc.degree) : 0}°${ZODIAC_SIGNS[asc.signIndex].glyph}</text>`;
  html += `<text x="${cx}" y="${cy + 22}" text-anchor="middle" font-family="var(--font-body)" font-size="9" fill="var(--ink-3)">${ZODIAC_SIGNS[asc.signIndex].name}</text>`;

  // Degree markers on outer ring
  for (let i = 0; i < 360; i += 10) {
    const angle = (i - 90) * Math.PI / 180;
    const isMajor = (i % 30 === 0);
    const r1 = outerR - (isMajor ? 8 : 4);
    const r2 = outerR;
    html += `<line x1="${cx + r1 * Math.cos(angle)}" y1="${cy + r1 * Math.sin(angle)}" x2="${cx + r2 * Math.cos(angle)}" y2="${cy + r2 * Math.sin(angle)}" stroke="rgba(25,21,17,${isMajor ? 0.2 : 0.08})" stroke-width="${isMajor ? 1.5 : 0.5}"/>`;
  }

  svg.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// MAIN CALCULATION
// ═══════════════════════════════════════════════════
function calculateChart() {
  const btn = document.getElementById('calcBtn');
  btn.disabled = true;
  btn.textContent = '计算中…';

  // Get input values
  const name = document.getElementById('userName').value || '星盘主人';
  const dateStr = document.getElementById('birthDate').value;
  const timeStr = document.getElementById('birthTime').value;
  const cityName = document.getElementById('birthCity').value;

  if (!dateStr) { alert('请选择出生日期'); btn.disabled = false; btn.textContent = '✦ 生成星盘'; return; }

  // Parse date and time
  const [year, month, day] = dateStr.split('-').map(Number);
  const [hour, minute] = timeStr.split(':').map(Number);
  const date = new Date(year, month - 1, day);

  // Get city coordinates
  let lat = 31.2304, lng = 121.4737; // Default: Shanghai
  let tzOffset = 8; // Default China UTC+8
  if (selectedCity) {
    lat = selectedCity.lat;
    lng = selectedCity.lng;
    tzOffset = selectedCity.tz || 8;
  } else {
    const matched = CITIES.find(c => c.name === cityName);
    if (matched) { lat = matched.lat; lng = matched.lng; tzOffset = matched.tz || 8; }
  }

  // Convert local time to UTC for astronomical calculations
  let utcHour = hour - tzOffset;
  let utcDay = day;
  let utcMonth = month;
  let utcYear = year;
  if (utcHour < 0) { utcHour += 24; utcDay--; }
  if (utcHour >= 24) { utcHour -= 24; utcDay++; }
  // Handle month/year boundaries (simplified)
  const daysInMonth = [0,31,28,31,30,31,30,31,31,30,31,30,31];
  if (utcYear % 4 === 0 && (utcYear % 100 !== 0 || utcYear % 400 === 0)) daysInMonth[2] = 29;
  while (utcDay < 1) { utcMonth--; if (utcMonth < 1) { utcMonth = 12; utcYear--; } utcDay += daysInMonth[utcMonth]; }
  while (utcDay > daysInMonth[utcMonth]) { utcDay -= daysInMonth[utcMonth]; utcMonth++; if (utcMonth > 12) { utcMonth = 1; utcYear++; } }

  // Calculate positions (using UTC time)
  const utcDate = new Date(utcYear, utcMonth - 1, utcDay);
  const positions = getPlanetPositions(utcDate, utcHour, minute, lng);
  const aspects = calcAspects(positions);

  // Update result header
  document.getElementById('resultTitle').textContent = name ? `${name} 的星盘` : '你的星盘';
  const dateFormatted = `${year}年${month}月${day}日 ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  document.getElementById('resultBirthInfo').textContent = `${dateFormatted} · ${cityName || '未知城市'}`;

  // Render
  renderChart(positions, aspects);
  renderBig3(positions);
  renderPlanetsTable(positions);
  renderElements(positions);
  renderTraits(positions, aspects);

  // Show result
  const resultSection = document.getElementById('resultSection');
  resultSection.classList.add('visible');
  resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

  btn.disabled = false;
  btn.textContent = '✦ 生成星盘';
}

// Auto-calculate on page load with default values
window.addEventListener('DOMContentLoaded', function() {
  // Set Shanghai as selected city
  const shanghai = CITIES.find(c => c.name === '上海');
  if (shanghai) {
    cityLat.value = shanghai.lat;
    cityLng.value = shanghai.lng;
    selectedCity = shanghai;
  }
});
</script>
</body>
